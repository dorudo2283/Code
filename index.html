<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Code Editor - Perfect Tree</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #1e1e1e; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;
            user-select: none;
        }
        .app-container { display: flex; height: 100vh; flex-direction: column; }
        .header {
            height: 40px; background-color: #111;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid #2d2d2d; font-size: 13px;
        }
        .logo { font-weight: bold; font-size: 15px; color: #61afef; }
        .save-status { color: #e5c07b; }
        .breadcrumbs { color: #888; }
        .breadcrumbs span { color: #fff; font-weight: bold; }

        .main-content { display: flex; flex: 1; position: relative; }
        .sidebar { width: 260px; background-color: #21252b; display: flex; border-right: 1px solid #181a1f; }
        .sidebar-actions {
            width: 50px; background-color: #1e2227;
            display: flex; flex-direction: column; align-items: center; padding-top: 15px;
        }
        .action-btn { position: relative; text-align: center; font-size: 11px; color: #ccc; }
        .badge {
            position: absolute; top: -5px; right: -10px;
            background-color: #e06c75; color: white; border-radius: 10px;
            padding: 2px 6px; font-size: 10px; font-weight: bold; display: none;
        }
        
        .file-tree { flex: 1; padding: 10px 0; font-size: 13px; overflow-y: auto; }
        .tree-title { color: #5c6370; padding: 0 15px 10px 15px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }

        /* ツリー構造の王道スタイル */
        .tree-item { padding: 6px 8px; cursor: pointer; display: flex; align-items: center; color: #abb2bf; position: relative; gap: 6px; }
        .tree-item:hover { background-color: #2c313c; }
        .tree-item.active { background-color: #3e4451; color: #61afef; }
        .tree-item.unsaved::after { content: "●"; color: #e5c07b; font-size: 8px; margin-left: auto; padding-right: 5px; }

        /* 矢印マーク用のスタイル */
        .arrow-icon { font-size: 10px; width: 12px; display: inline-block; color: #5c6370; transition: transform 0.1s; }

        .editor-container { flex: 1; position: relative; background-color: #282c34; }
        #monaco-root { width: 100%; height: 100%; }

        /* 右クリックメニュー */
        .context-menu {
            position: absolute; background-color: #21252b; border: 1px solid #181a1f;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 10000; display: none;
            padding: 5px 0; border-radius: 4px; min-width: 160px;
        }
        .context-menu-item {
            padding: 8px 15px; cursor: pointer; color: #abb2bf; font-size: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .context-menu-item:hover { background-color: #3e4451; color: #fff; }
        .context-menu-separator { height: 1px; background-color: #181a1f; margin: 4px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo">MY EDITOR</div>
            <div class="save-status" id="saveStatus">Saved</div>
            <div class="breadcrumbs" id="breadcrumbs">ここにフォルダやファイルをドロップしてください</div>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-actions">
                    <div class="action-btn">
                        <span style="font-size: 24px;">📄</span>
                        <div class="badge" id="unsavedCountBadge">0</div>
                        <div style="margin-top: 3px; font-size: 10px;">Save</div>
                    </div>
                </div>
                
                <div class="file-tree" id="fileTreeZone">
                    <div class="tree-title">エクスプローラー (D&D専用)</div>
                    <div id="treeContainer"></div>
                </div>
            </div>

            <div class="editor-container">
                <div id="monaco-root"></div>
            </div>
        </div>
    </div>

    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="handleMenuAction('createFile')">📄 新しいファイル</div>
        <div class="context-menu-item" onclick="handleMenuAction('createFolder')">📁 新しいフォルダ</div>
        <div class="context-menu-separator"></div>
        <div class="context-menu-item" onclick="handleMenuAction('delete')" style="color: #f44336;">🗑️ 画面から削除</div>
    </div>

    <script>
        let filesStorage = {};
        let currentFileKey = "";
        let editorInstance = null;
        let rightClickedKey = null;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editorInstance = monaco.editor.create(document.getElementById('monaco-root'), {
                value: "// 【使い方】\n// パソコンからフォルダやファイルを、左側のエクスプローラーにドロップしてください。\n// フォルダを右クリックして新規作成、または「画面から削除」が可能です。\n// フォルダをクリックすると、配下のファイルを開閉できます。",
                language: 'javascript',
                theme: 'vs-dark',
                fontSize: 14,
                automaticLayout: true
            });

            editorInstance.onDidChangeModelContent(() => {
                if (currentFileKey && filesStorage[currentFileKey]) {
                    filesStorage[currentFileKey].content = editorInstance.getValue();
                    if (filesStorage[currentFileKey].isSaved) {
                        filesStorage[currentFileKey].isSaved = false;
                        const item = document.getElementById(`item-${btoa(encodeURIComponent(currentFileKey))}`);
                        if (item) item.classList.add('unsaved');
                        updateGlobalStatus();
                    }
                }
            });
        });

        // --- ドラッグ＆ドロップ処理 ---
        const sidebar = document.getElementById('sidebar');
        sidebar.addEventListener('dragover', (e) => { e.preventDefault(); sidebar.style.backgroundColor = "#2c313c"; });
        sidebar.addEventListener('dragleave', () => { sidebar.style.backgroundColor = "#21252b"; });
        sidebar.addEventListener('drop', async (e) => {
            e.preventDefault();
            sidebar.style.backgroundColor = "#21252b";

            const items = e.dataTransfer.items;
            if (items) {
                for (let i = 0; i < items.length; i++) {
                    if (typeof items[i].getAsFileSystemHandle === 'function') {
                        const handle = await items[i].getAsFileSystemHandle();
                        await scanHandle(handle, handle.name, handle, null); // 自身のハンドルを親として追跡
                    }
                }
                renderTree();
                updateGlobalStatus();
            }
        });

        // ファイル・フォルダハンドルを再帰的にスキャン
        async function scanHandle(handle, currentPath, parentHandle = null, parentPath = null) {
            if (handle.kind === 'file') {
                try {
                    const file = await handle.getFile();
                    const text = await file.text();
                    const ext = handle.name.split('.').pop().toLowerCase();
                    let lang = 'plaintext';
                    if (['html', 'htm'].includes(ext)) lang = 'html';
                    else if (['js', 'mjs', 'cjs'].includes(ext)) lang = 'javascript';
                    else if (ext === 'css') lang = 'css';

                    if (!filesStorage[currentPath]) {
                        filesStorage[currentPath] = {
                            kind: 'file', name: handle.name, path: currentPath,
                            content: text, language: lang, isSaved: true,
                            handle: handle, parentHandle: parentHandle, parentPath: parentPath,
                            visible: true // フォルダ開閉用の表示フラグ
                        };
                    }
                } catch (e) { console.warn(e); }
            } else if (handle.kind === 'directory') {
                if (!filesStorage[currentPath]) {
                    filesStorage[currentPath] = {
                        kind: 'directory', name: handle.name, path: currentPath,
                        handle: handle, parentHandle: parentHandle, parentPath: parentPath,
                        isOpen: true, visible: true // フォルダ自体の開閉状態
                    };
                }
                for await (const entry of handle.values()) {
                    await scanHandle(entry, `${currentPath}/${entry.name}`, handle, currentPath);
                }
            }
        }

        // --- 多階層ツリー構造の描写 ---
        function renderTree() {
            const container = document.getElementById('treeContainer');
            container.innerHTML = '';

            const sortedKeys = Object.keys(filesStorage).sort((a, b) => a.localeCompare(b));

            sortedKeys.forEach(key => {
                const itemData = filesStorage[key];
                
                // 親フォルダが閉じている場合は、このアイテムを表示しない（非表示ロジック）
                if (itemData.parentPath) {
                    const pathParts = itemData.parentPath.split('/');
                    let checkPath = "";
                    for(let part of pathParts) {
                        checkPath = checkPath ? `${checkPath}/${part}` : part;
                        if (filesStorage[checkPath] && !filesStorage[checkPath].isOpen) {
                            return; // 親の誰かが閉じられていたら描画スキップ
                        }
                    }
                }

                const itemEl = document.createElement('div');
                itemEl.id = `item-${btoa(encodeURIComponent(key))}`;
                itemEl.className = 'tree-item';
                
                // 階層の深さに応じてインデントを計算
                const depth = key.split('/').length - 1;
                itemEl.style.paddingLeft = `${10 + depth * 12}px`;

                if (key === currentFileKey) itemEl.classList.add('active');
                if (itemData.kind === 'file' && !itemData.isSaved) itemEl.classList.add('unsaved');

                // 矢印（＞）マークの制御
                let arrowHtml = '<span class="arrow-icon"></span>'; // ファイルの場合は空白のスペース
                if (itemData.kind === 'directory') {
                    arrowHtml = itemData.isOpen ? '<span class="arrow-icon">動</span>' : '<span class="arrow-icon">右</span>';
                    // 環境依存を防ぐため、単純なテキスト文字「∨」と「＞」にマッピング
                    arrowHtml = itemData.isOpen ? '<span class="arrow-icon">∨</span>' : '<span class="arrow-icon">＞</span>';
                }

                // アイコンの選定（桃を排除し、シンプルな記号表現に変更）
                let icon = itemData.kind === 'directory' ? '📁' : '📄';

                itemEl.innerHTML = `${arrowHtml} ${icon} ${itemData.name}`;

                // 左クリック時の挙動
                itemEl.onclick = (e) => {
                    if (itemData.kind === 'file') {
                        switchFile(key);
                    } else if (itemData.kind === 'directory') {
                        // フォルダクリックで開閉状態を反転
                        itemData.isOpen = !itemData.isOpen;
                        renderTree(); // 再描写して子を隠す/出す
                    }
                };

                // 右クリックイベント
                itemEl.oncontextmenu = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    showContextMenu(e.clientX, e.clientY, key);
                };

                container.appendChild(itemEl);
            });
        }

        function switchFile(key) {
            currentFileKey = key;
            const fileData = filesStorage[key];
            renderTree();
            if (editorInstance) {
                editorInstance.setValue(fileData.content);
                monaco.editor.setModelLanguage(editorInstance.getModel(), fileData.language);
            }
            updateBreadcrumbs(fileData.path);
            updateGlobalStatus();
        }

        // --- 右クリックメニューの制御 ---
        const menu = document.getElementById('contextMenu');
        function showContextMenu(x, y, key) {
            rightClickedKey = key;
            menu.style.display = 'block';
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;
        }

        document.addEventListener('click', () => { menu.style.display = 'none'; });
        document.getElementById('fileTreeZone').oncontextmenu = (e) => {
            if(e.target.id === 'fileTreeZone' || e.target.id === 'treeContainer') {
                e.preventDefault();
                showContextMenu(e.clientX, e.clientY, "");
            }
        };

        // --- 右クリックアクションの実装 ---
        async function handleMenuAction(action) {
            menu.style.display = 'none';
            const targetItem = filesStorage[rightClickedKey];

            // 1. ファイル・フォルダの新規作成
            if (action === 'createFile' || action === 'createFolder') {
                let dirHandle = null;
                let parentPath = "";

                if (!rightClickedKey) {
                    alert("フォルダをドロップした領域内で操作してください。"); return;
                }

                if (targetItem.kind === 'directory') {
                    dirHandle = targetItem.handle; parentPath = targetItem.path;
                } else {
                    dirHandle = targetItem.parentHandle;
                    parentPath = targetItem.parentPath || "";
                }

                if (!dirHandle) { alert("親フォルダへのアクセス権がありません。"); return; }

                const name = prompt(action === 'createFile' ? "新しいファイル名を入力:" : "新しいフォルダ名を入力:");
                if (!name) return;

                const newFullPath = parentPath ? `${parentPath}/${name}` : name;

                try {
                    if (action === 'createFile') {
                        // パソコン側に本物の空ファイルを作成
                        const newFileHandle = await dirHandle.getFileHandle(name, { create: true });
                        filesStorage[newFullPath] = {
                            kind: 'file', name: name, path: newFullPath, content: "",
                            language: name.split('.').pop() === 'js' ? 'javascript' : 'html',
                            isSaved: true, handle: newFileHandle, parentHandle: dirHandle, parentPath: parentPath
                        };
                        switchFile(newFullPath);
                    } else {
                        // パソコン側に本物のフォルダを作成
                        const newDirHandle = await dirHandle.getDirectoryHandle(name, { create: true });
                        filesStorage[newFullPath] = {
                            kind: 'directory', name: name, path: newFullPath,
                            handle: newDirHandle, parentHandle: dirHandle, parentPath: parentPath,
                            isOpen: true
                        };
                        renderTree();
                    }
                } catch(e) {
                    alert("作成に失敗しました。書き込み権限がありません。");
                    console.error(e);
                }
            }

            // 2. 画面から削除（PCからは消さない安心仕様）
            if (action === 'delete') {
                if (!rightClickedKey) return;
                
                // 選択されたアイテムとその子孫をメモリからのみ削除
                for (let key in filesStorage) {
                    if (key === rightClickedKey || key.startsWith(rightClickedKey + '/')) {
                        delete filesStorage[key];
                    }
                }
                if (currentFileKey.startsWith(rightClickedKey)) currentFileKey = "";
                renderTree();
                updateGlobalStatus();
            }
        }

        // --- ステータス・保存処理 ---
        function updateGlobalStatus() {
            let unsavedCount = 0;
            for (let key in filesStorage) {
                if (filesStorage[key].kind === 'file' && !filesStorage[key].isSaved) unsavedCount++;
            }
            const badge = document.getElementById('unsavedCountBadge');
            badge.innerText = unsavedCount;
            badge.style.display = unsavedCount > 0 ? "block" : "none";

            const statusText = document.getElementById('saveStatus');
            if (currentFileKey && filesStorage[currentFileKey] && !filesStorage[currentFileKey].isSaved) {
                statusText.innerText = "Not Saved..."; statusText.style.color = "#e5c07b";
            } else {
                statusText.innerText = "Saved"; statusText.style.color = "#98c379";
            }
        }

        function updateBreadcrumbs(filePath) {
            const breadcrumbsContainer = document.getElementById('breadcrumbs');
            const parts = filePath.split('/');
            const fileName = parts.pop();
            if(parts.length === 0) { breadcrumbsContainer.innerHTML = `<span>${fileName}</span>`; }
            else {
                const folderPath = parts.join(' > ');
                breadcrumbsContainer.innerHTML = `${folderPath} > <span>${fileName}</span>`;
            }
        }

        window.addEventListener('keydown', async function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                const activeFile = filesStorage[currentFileKey];
                if (activeFile && activeFile.handle) {
                    try {
                        const writable = await activeFile.handle.createWritable();
                        await writable.write(editorInstance.getValue());
                        await writable.close();

                        activeFile.isSaved = true;
                        updateGlobalStatus();
                        renderTree();
                    } catch (err) { alert("保存に失敗しました。"); }
                }
            }
        });
    </script>
</body>
</html>
