<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Base 〜 祝！WEB開設 〜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        /* ヘッダー */
        header {
            background-color: #ff8e8e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: bold; color: #0d2c54; cursor: pointer; }
        .logo span { color: #2a7b4c; }
        
        /* 検索窓まわり（クリアボタン追加のためのラッパー） */
        .search-area { display: flex; gap: 8px; align-items: center; }
        .search-input-wrapper {
            position: relative;
            display: inline-block;
        }
        .search-input-wrapper input {
            padding: 6px 30px 6px 12px; /* 右側にバツボタンのスペースを確保 */
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        /* クリアボタン（×）のスタイル */
        .clear-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #999;
            font-size: 16px;
            cursor: pointer;
            display: none; /* 文字が入るまで非表示 */
        }
        .clear-btn:hover { color: #333; }

        .search-area button, .select-sort {
            padding: 6px 12px;
            background-color: #fff;
            border: 1px solid #999;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        /* お知らせ */
        .news-bar {
            background-color: #ffe4e4;
            padding: 8px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #ffcdcd;
        }

        /* 各種セクション（画面切り替え用） */
        .page-section {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 【初期画面】2カラムレイアウト */
        .default-layout {
            display: flex; border: 1px solid #aaa; background-color: #fff;
        }
        .column { flex: 1; min-height: 400px; }
        .column:first-child { border-right: 1px solid #aaa; }
        .column-title {
            background-color: #ccc; padding: 12px; text-align: center;
            font-size: 18px; font-weight: bold; letter-spacing: 0.3em;
        }
        .list-container { padding: 20px; }
        .scrollable-list { max-height: 400px; overflow-y: auto; }

        /* 小説アイテム（共通） */
        .novel-item {
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #eee;
        }
        .novel-title-link {
            color: #0066cc; text-decoration: none; font-weight: bold; font-size: 18px; cursor: pointer;
        }
        .novel-title-link:hover { text-decoration: underline; }
        .rank-badge { color: #ffaa00; font-weight: bold; margin-right: 5px; }

        /* 【画面1：検索結果画面】専用スタイル */
        .search-result-header {
            text-align: center; font-size: 22px; color: #666; margin-bottom: 25px;
        }
        .search-result-box {
            border: 2px solid #333; background-color: #ccc;
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; width: 100%;
        }
        .result-main { display: flex; align-items: baseline; gap: 40px; }
        .result-title { font-size: 24px; font-weight: bold; color: #0066cc; cursor: pointer; text-decoration: underline; }
        .result-meta { font-size: 14px; color: #333; line-height: 1.6; }
        .result-fav-status { font-size: 14px; color: #333; text-align: right; }

        /* 【画面2：本文閲覧画面】専用スタイル（明朝体） */
        .viewer-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 40px;
        }
        .viewer-left-actions { display: flex; flex-direction: column; gap: 10px; }
        /* 登録のやつ ボタン */
        .fav-toggle-btn {
            padding: 6px 12px; background-color: #fff; border: 1px solid #aaa;
            cursor: pointer; font-size: 14px; text-align: center;
        }
        .fav-toggle-btn.active { background-color: #ffcc00; border-color: #e6b800; }
        /* トップに戻るボタン */
        .back-to-top {
            padding: 4px 8px; font-size: 12px; background-color: #eee; border: 1px solid #ccc;
            cursor: pointer; text-align: center;
        }
        
        .viewer-center-title { font-size: 32px; font-weight: bold; text-align: center; flex: 1; }
        .viewer-right-meta { text-align: right; font-size: 14px; color: #333; line-height: 1.6; }
        
        /* 本文エリア（明朝体指定） */
        .viewer-body-text {
            font-family: 'Shippori Mincho', 'YuMincho', '游明朝', 'MS Mincho', Georgia, serif;
            font-size: 20px; line-height: 2.4; letter-spacing: 0.08em;
            white-space: pre-wrap; word-wrap: break-word;
            max-width: 750px; margin: 0 auto; padding-bottom: 100px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showDefaultPage()">S<span>tory</span> B<span>ase</span> <span style="font-size: 14px; color:#333; font-weight:normal;">〜 祝！WEB開設 〜</span></div>
        <div class="search-area">
            <div class="search-input-wrapper">
                <input type="text" id="search-input" placeholder="作品名・作者名で検索">
                <button id="clear-btn" class="clear-btn">×</button>
            </div>
            <button id="search-btn">検索</button>
            <select id="sort-select" class="select-sort">
                <option value="none">並び替え：なし</option>
                <option value="new">新着順</option>
                <option value="old">古い順</option>
            </select>
        </div>
    </header>

    <div class="news-bar">
        お知らせ：タロウが作った小説WEBサイト、Story Baseを開設しました！オリジナルの小説作品を応募しています！
    </div>


    <div id="section-default" class="page-section">
        <div class="default-layout">
            <div class="column">
                <div class="column-title">新 着 順</div>
                <div class="list-container" id="recent-list"></div>
            </div>
            <div class="column">
                <div class="column-title">登 録 し た 小 説</div>
                <div class="list-container scrollable-list" id="registered-list"></div>
            </div>
        </div>
    </div>


    <div id="section-search-result" class="page-section" style="display: none;">
        <div class="search-result-header" id="search-result-title-text">
            「 絶望 」の結果（1件）
        </div>
        <div id="search-results-container">
            </div>
    </div>


    <div id="section-viewer" class="page-section" style="display: none;">
        <div class="viewer-header">
            <div class="viewer-left-actions">
                <button class="fav-toggle-btn" id="v-fav-btn" onclick="toggleFavoriteFromViewer()">登録のやつ</button>
                <button class="back-to-top" onclick="showDefaultPage()">トップへ戻る</button>
            </div>
            <div class="viewer-center-title" id="v-title">作品タイトル</div>
            <div class="viewer-right-meta">
                <div id="v-date">2026年7月7日</div>
                <div id="v-author">作者：タロウ</div>
            </div>
        </div>
        <div class="viewer-body-text" id="v-content">
            ここに本文が明朝体で表示されます。
        </div>
    </div>


    <script src="Shosetsu.js"></script>
    <script>
        // お気に入り作品のIDを保存する配列
        let favoriteIds = [];
        // 現在閲覧中の作品IDを保持
        let currentViewingId = null;

        window.addEventListener('DOMContentLoaded', () => {
            // 初期状態の画面描画
            renderDefaultLists();

            // 検索・並び替えイベント設定
            document.getElementById('search-btn').addEventListener('click', executeSearch);
            document.getElementById('search-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') executeSearch();
            });
            document.getElementById('sort-select').addEventListener('change', executeSearch);

            // 検索窓クリア（×）ボタンの制御
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-btn');

            searchInput.addEventListener('input', () => {
                clearBtn.style.display = searchInput.value.length > 0 ? 'block' : 'none';
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                searchInput.focus();
                showDefaultPage(); // クリアしたら初期画面に戻す
            });
        });

        // 画面切り替え：初期トップ画面を表示
        function showDefaultPage() {
            document.getElementById('section-default').style.display = 'block';
            document.getElementById('section-search-result').style.display = 'none';
            document.getElementById('section-viewer').style.display = 'none';
            currentViewingId = null;
            renderDefaultLists();
        }

        // 初期トップ画面（2カラム）のリスト描画
        function renderDefaultLists() {
            // 1. 左カラム（新着順：デフォルトは全件を日付順）
            const recentContainer = document.getElementById('recent-list');
            recentContainer.innerHTML = '';
            const sortedByDate = [...novelData].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedByDate.forEach((novel, index) => {
                recentContainer.insertAdjacentHTML('beforeend', `
                    <div class="novel-item">
                        <span class="rank-badge">${index + 1}</span>
                        <span class="novel-title-link" onclick="openViewer(${novel.id})">${novel.title}</span>
                    </div>
                `);
            });

            // 2. 右カラム（登録した小説）
            renderRightFavoriteList();
        }

        // 右カラム（登録した小説）の更新
        function renderRightFavoriteList() {
            const favContainer = document.getElementById('registered-list');
            favContainer.innerHTML = '';
            const favNovels = novelData.filter(n => favoriteIds.includes(n.id));

            if (favNovels.length === 0) {
                favContainer.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">登録された小説はここに表示されます。</p>';
                return;
            }

            favNovels.forEach((novel, index) => {
                favContainer.insertAdjacentHTML('beforeend', `
                    <div class="novel-item">
                        <span class="rank-badge">${index + 1}</span>
                        <span class="novel-title-link" onclick="openViewer(${novel.id})">${novel.title}</span>
                    </div>
                `);
            });
        }

        // 検索処理コアロジック（画面1への切り替え）
        function executeSearch() {
            const keyword = document.getElementById('search-input').value.trim().toLowerCase();
            const sortVal = document.getElementById('sort-select').value;

            if (keyword === "") {
                showDefaultPage();
                return;
            }

            // 画面を検索結果セクションに切り替え
            document.getElementById('section-default').style.display = 'none';
            document.getElementById('section-search-result').style.display = 'block';
            document.getElementById('section-viewer').style.display = 'none';

            // スコアリング処理（完全一致を最上位にするため）
            let filteredList = [];
            novelData.forEach(novel => {
                const titleLower = novel.title.toLowerCase();
                const authorLower = novel.author.toLowerCase();
                let score = 0;

                if (titleLower === keyword || authorLower === keyword) {
                    score = 100; // 完全一致
                } else if (titleLower.includes(keyword) || authorLower.includes(keyword)) {
                    score = 10;  // 部分一致
                }

                if (score > 0) {
                    filteredList.push({ ...novel, _score: score });
                }
            });

            // ソート適用（検索適合度スコア優先、その後に新着・古い順）
            filteredList.sort((a, b) => {
                if (a._score !== b._score) return b._score - a._score;
                if (sortVal === "new") return new Date(b.date) - new Date(a.date);
                if (sortVal === "old") return new Date(a.date) - new Date(b.date);
                return 0;
            });

            // 結果ヘッダーテキストの更新
            document.getElementById('search-result-title-text').innerText = `「 ${document.getElementById('search-input').value} 」の結果（${filteredList.length}件）`;

            // 検索結果の描画（ご提示画像1のスタイルを完全再現）
            const resultsContainer = document.getElementById('search-results-container');
            resultsContainer.innerHTML = '';

            if (filteredList.length === 0) {
                resultsContainer.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">該当する作品がありませんでした。</p>';
                return;
            }

            filteredList.forEach(novel => {
                const isFav = favoriteIds.includes(novel.id);
                // 登録状態のテキスト判定
                const favStatusText = isFav ? "登録済み" : "登録してない";

                // 日付フォーマットの調整 (YYYY年MM月DD日)
                const dateObj = new Date(novel.date);
                const formattedDate = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;

                const html = `
                    <div class="search-result-box" style="margin-bottom: 15px;">
                        <div class="result-main">
                            <div class="result-title" onclick="openViewer(${novel.id})">${novel.title}</div>
                            <div class="result-meta">
                                ${formattedDate}<br>
                                作者：${novel.author}
                            </div>
                        </div>
                        <div class="result-fav-status">
                            ${favStatusText}
                        </div>
                    </div>
                `;
                resultsContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        // 本文閲覧処理（画面2への切り替え）
        function openViewer(id) {
            const novel = novelData.find(n => n.id === id);
            if (!novel) return;

            currentViewingId = id;

            // 各セクションの表示切り替え
            document.getElementById('section-default').style.display = 'none';
            document.getElementById('section-search-result').style.display = 'none';
            document.getElementById('section-viewer').style.display = 'block';

            // データ注入
            document.getElementById('v-title').innerText = novel.title;
            document.getElementById('v-author').innerText = `作者：${novel.author}`;
            
            const dateObj = new Date(novel.date);
            document.getElementById('v-date').innerText = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;
            
            document.getElementById('v-content').innerText = novel.content;

            // 閲覧画面の「登録のやつ」ボタンの状態更新
            updateViewerFavButton();

            // 認知科学：画面が切り替わったことを即座に認識させるため、最上部へスムーズスクロール
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 閲覧画面内の「登録のやつ」ボタンの状態反転
        function updateViewerFavButton() {
            const favBtn = document.getElementById('v-fav-btn');
            if (favoriteIds.includes(currentViewingId)) {
                favBtn.innerText = "登録済み";
                favBtn.classList.add('active');
            } else {
                favBtn.innerText = "登録のやつ";
                favBtn.classList.remove('active');
            }
        }

        // 閲覧画面からのお気に入り登録・解除処理
        function toggleFavoriteFromViewer() {
            if (!currentViewingId) return;

            const index = favoriteIds.indexOf(currentViewingId);
            if (index === -1) {
                favoriteIds.push(currentViewingId); // 登録
            } else {
                favoriteIds.splice(index, 1); // 解除
            }

            // 状態をボタンと裏のリストに即時反映
            updateViewerFavButton();
            renderRightFavoriteList();
        }
    </script>
</body>
</html>
